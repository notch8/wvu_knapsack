x-app: &app
  env_file:
    - .env
    - .env.production
  build:
    context: .
    target: hyku-web
    cache_from:
      - ghcr.io/notch8/wvu_knapsack/base:latest
      - ghcr.io/notch8/wvu_knapsack:latest
    args:
      BUILDKIT_INLINE_CACHE: 1
      APP_PATH: ./hyrax-webapp
  image: ghcr.io/notch8/wvu_knapsack:${TAG:-latest}
  environment:
    - BUNDLE_LOCAL__HYKU_KNAPSACK=/app/samvera
    - BUNDLE_DISABLE_LOCAL_BRANCH_CHECK=true
    - BUNDLE_BUNDLER_INJECT__GEM_PATH=/app/samvera/bundler.d
  volumes:
    - ./data/node_modules:/app/samvera/hyrax-webapp/node_modules
    - ./data/uploads:/app/samvera/hyrax-webapp/public/uploads
    - ./data/assets:/app/samvera/hyrax-webapp/public/assets
    - ./data/cache:/app/samvera/hyrax-webapp/tmp/cache
    - .:/app/samvera

networks:
  internal:
    driver: bridge

services:
  zoo:
    env_file:
      - .env
      - .env.production
    extends:
      file: ./hyrax-webapp/docker-compose.production.yml  # FIXED PATH
      service: zoo
    volumes:
      - ./data/zoo:/data
      - ./data/zk:/datalog

  solr:
    container_name: solr
    image: ghcr.io/notch8/wvu_knapsack/solr:${TAG:-latest}
    restart: on-failure
    platform: linux/amd64
    env_file:
      - .env
      - .env.production
    user: root
    command: bash -c "sh /scripts/startup.sh hydra_prod"
    ports:
      - "8983:8983"
    volumes:
      - ./data/solr:/var/solr/data/hydra_prod/data
      - ./data/logs/dev/:/var/solr/logs
      - ./solr9-setup:/solr9-setup
      - ./startup-solr.sh:/scripts/startup.sh
    healthcheck:
      test: "curl -f localhost:8983/solr/#/"
      start_period: 30s
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      internal:

  fcrepo:
    env_file:
      - .env
      - .env.production
    extends:
      file: ./hyrax-webapp/docker-compose.production.yml  # FIXED PATH
      service: fcrepo
    volumes:
      - ./data/fcrepo:/data

  db:
    env_file:
      - .env
      - .env.production
    extends:
      file: ./hyrax-webapp/docker-compose.production.yml  # FIXED PATH
      service: db
    volumes:
      - ./data/db:/var/lib/postgresql/data

  redis:
    env_file:
      - .env
      - .env.production
    extends:
      file: ./hyrax-webapp/docker-compose.production.yml  # FIXED PATH
      service: redis
    volumes:
      - ./data/redis:/data

  web:
    <<: *app
    env_file:
      - .env
      - .env.production
    extends:
      file: ./hyrax-webapp/docker-compose.production.yml  # FIXED PATH
      service: web
    environment:
      - BUNDLE_LOCAL__HYKU_KNAPSACK=/app/samvera
      - BUNDLE_DISABLE_LOCAL_BRANCH_CHECK=true
      - VIRTUAL_PORT=3000
    ports:
      - "3000:3000"

  worker:
    <<: *app
    env_file:
      - .env
      - .env.production
    extends:
      file: ./hyrax-webapp/docker-compose.production.yml  # FIXED PATH
      service: worker
    build:
      context: .
      target: hyku-worker
      cache_from:
        - ghcr.io/notch8/wvu_knapsack/base:latest
        - ghcr.io/notch8/wvu_knapsack/worker:latest
      args:
        BUILDKIT_INLINE_CACHE: 1
        APP_PATH: ./hyrax-webapp
    image: ghcr.io/notch8/wvu_knapsack/worker:${TAG:-latest}
    volumes:
      - ./data/node_modules:/app/samvera/hyrax-webapp/node_modules
      - ./data/uploads:/app/samvera/hyrax-webapp/public/uploads
      - ./data/assets:/app/samvera/hyrax-webapp/public/assets
      - ./data/cache:/app/samvera/hyrax-webapp/tmp/cache
      - .:/app/samvera

  check_volumes:
    <<: *app
    env_file:
      - .env
      - .env.production
    extends:
      file: ./hyrax-webapp/docker-compose.production.yml  # FIXED PATH
      service: check_volumes

  initialize_app:
    <<: *app
    env_file:
      - .env
      - .env.production
    extends:
      file: ./hyrax-webapp/docker-compose.production.yml  # FIXED PATH
      service: initialize_app


