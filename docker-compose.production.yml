# Fully standalone production compose for wvu_knapsack.
# Does NOT extend or reference hyrax-webapp/docker-compose.production.yml —
# that file belongs to the submodule and must not be modified.
# All configuration comes from .env.production (gitignored, see .env.production.example).

x-app: &app
  env_file:
    - .env.production
  build:
    context: .
    target: hyku-web
    cache_from:
      - ghcr.io/notch8/wvu_knapsack/base:latest
      - ghcr.io/notch8/wvu_knapsack:latest
    args:
      BUILDKIT_INLINE_CACHE: 1
      APP_PATH: ./hyrax-webapp
  image: ghcr.io/notch8/wvu_knapsack:${TAG:-latest}
  environment:
    - BUNDLE_LOCAL__HYKU_KNAPSACK=/app/samvera
    - BUNDLE_DISABLE_LOCAL_BRANCH_CHECK=true
    - BUNDLE_BUNDLER_INJECT__GEM_PATH=/app/samvera/bundler.d
  volumes:
    - ./data/bundle:/usr/local/bundle
    - ./data/node_modules:/app/samvera/hyrax-webapp/node_modules
    - ./data/uploads:/app/samvera/hyrax-webapp/public/uploads
    - ./data/assets:/app/samvera/hyrax-webapp/public/assets
    - ./data/cache:/app/samvera/hyrax-webapp/tmp/cache
    - .:/app/samvera
  networks:
    - internal

networks:
  internal:
    driver: bridge

services:

  zoo:
    image: zookeeper:3.6.2
    restart: on-failure
    environment:
      - ZOO_MY_ID=1
      - ZOO_SERVERS=server.1=zoo:2888:3888;2181
      - ZOO_4LW_COMMANDS_WHITELIST=mntr,srvr,ruok,conf
    volumes:
      - ./data/zoo:/data
      - ./data/zk:/datalog
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "echo 'ruok' | nc -w 2 -q 2 localhost 2181 | grep imok || exit 1"]
      interval: "10s"
      timeout: "8s"

  solr:
    container_name: solr
    image: ghcr.io/notch8/wvu_knapsack/solr:${TAG:-latest}
    restart: on-failure
    platform: linux/amd64
    env_file:
      - .env.production
    environment:
      - SOLR_ENABLE_CLOUD_MODE=yes
      - SOLR_CLOUD_BOOTSTRAP=yes
      - ZK_HOST=zoo:2181
    user: root
    command: bash -c "sh /scripts/startup.sh"
    ports:
      - "8983:8983"
    volumes:
      - ./data/solr:/var/solr/data
      - ./data/logs/solr:/var/solr/logs
      - ./solr-setup:/solr-setup
      - ./startup-solr.sh:/scripts/startup.sh
    healthcheck:
      test: "curl -sf http://$$SOLR_ADMIN_USER:$$SOLR_ADMIN_PASSWORD@localhost:8983/solr/admin/collections?action=LIST"
      start_period: 300s
      interval: 10s
      timeout: 10s
      retries: 30
    depends_on:
      zoo:
        condition: service_healthy
    networks:
      - internal

  fcrepo:
    image: ghcr.io/samvera/fcrepo4:4.7.5
    restart: on-failure
    env_file:
      - .env.production
    environment:
      - JAVA_OPTS=${JAVA_OPTS} -Dfcrepo.modeshape.configuration="classpath:/config/jdbc-postgresql/repository.json" -Dfcrepo.postgresql.host=db -Dfcrepo.postgresql.username=${DB_USER} -Dfcrepo.postgresql.password=${DB_PASSWORD} -Dfcrepo.object.directory="/data/objects" -Dfcrepo.binary.directory="/data/fcrepo.binary.directory" -Djava.io.tmpdir="/data/tmp"
    expose:
      - 8080
    volumes:
      - ./data/fcrepo:/data
    networks:
      - internal

  db:
    image: postgres:11.1
    restart: on-failure
    env_file:
      - .env.production
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_USER=${DB_USER}
    volumes:
      - ./data/db:/var/lib/postgresql/data
    networks:
      - internal

  redis:
    image: redis:5
    restart: on-failure
    command: redis-server
    volumes:
      - ./data/redis:/data
    networks:
      - internal

  check_volumes:
    <<: *app
    user: root
    entrypoint: ["sh", "-c"]
    command:
      - >
        chown -R app:app /usr/local/bundle &&
        chown -R app:app /app/samvera/hyrax-webapp/public/uploads &&
        chown -R app:app /app/samvera/hyrax-webapp/public/assets &&
        chown -R app:app /app/samvera/hyrax-webapp/tmp/cache

  initialize_app:
    <<: *app
    entrypoint: ["sh", "-c"]
    command:
      - >
        solrcloud-upload-configset.sh /app/samvera/hyrax-webapp/solr/conf &&
        SOLR_COLLECTION_NAME=hydra-production solrcloud-assign-configset.sh &&
        SOLR_COLLECTION_NAME=hydra-test solrcloud-assign-configset.sh &&
        bundle install &&
        RAILS_ENV=production bundle exec rails assets:precompile &&
        db-migrate-seed.sh
    depends_on:
      check_volumes:
        condition: service_completed_successfully
      db:
        condition: service_started
      solr:
        condition: service_healthy
      fcrepo:
        condition: service_started
      redis:
        condition: service_started
      zoo:
        condition: service_healthy

  worker:
    <<: *app
    build:
      context: .
      target: hyku-worker
      cache_from:
        - ghcr.io/notch8/wvu_knapsack/base:latest
        - ghcr.io/notch8/wvu_knapsack/worker:latest
      args:
        BUILDKIT_INLINE_CACHE: 1
        APP_PATH: ./hyrax-webapp
    image: ghcr.io/notch8/wvu_knapsack/worker:${TAG:-latest}
    entrypoint: ["sh", "-c"]
    command:
      - bundle check || bundle install && ./bin/worker
    depends_on:
      initialize_app:
        condition: service_completed_successfully
      db:
        condition: service_started
      solr:
        condition: service_healthy
      fcrepo:
        condition: service_started
      redis:
        condition: service_started
      zoo:
        condition: service_healthy
    volumes:
      - ./data/bundle:/usr/local/bundle
      - ./data/node_modules:/app/samvera/hyrax-webapp/node_modules
      - ./data/uploads:/app/samvera/hyrax-webapp/public/uploads
      - ./data/assets:/app/samvera/hyrax-webapp/public/assets
      - ./data/cache:/app/samvera/hyrax-webapp/tmp/cache
      - .:/app/samvera

  web:
    <<: *app
    entrypoint: ["sh", "-c"]
    command:
      - bundle check || bundle install && ./bin/web
    ports:
      - "3000:3000"
    environment:
      - BUNDLE_LOCAL__HYKU_KNAPSACK=/app/samvera
      - BUNDLE_DISABLE_LOCAL_BRANCH_CHECK=true
      - VIRTUAL_PORT=3000
    depends_on:
      db:
        condition: service_started
      solr:
        condition: service_healthy
      fcrepo:
        condition: service_started
      redis:
        condition: service_started
      zoo:
        condition: service_healthy
      worker:
        condition: service_started
      initialize_app:
        condition: service_completed_successfully
